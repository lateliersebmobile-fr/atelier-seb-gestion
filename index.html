<style>
:root{--bg:#0c0d12;--bg2:#131520;--card:#181b28;--card2:#1e2235;--accent:#f59e0b;--accent2:#d97706;--success:#10b981;--danger:#ef4444;--info:#3b82f6;--text:#e5e7eb;--muted:#7a8194;--border:#262a3a;--hover:#252940}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);overflow:hidden;height:100vh}
h1,h2,h3,h4,h5{font-family:'Space Grotesk',sans-serif}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:var(--bg2)}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--muted)}
.sidebar{width:240px;min-width:240px;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;height:100vh;overflow-y:auto}
.sidebar .logo{padding:20px 16px;border-bottom:1px solid var(--border)}
.sidebar nav a{display:flex;align-items:center;gap:12px;padding:11px 16px;color:var(--muted);text-decoration:none;font-size:14px;transition:all .2s;border-left:3px solid transparent;cursor:pointer}
.sidebar nav a:hover{background:var(--hover);color:var(--text)}
.sidebar nav a.active{background:var(--hover);color:var(--accent);border-left-color:var(--accent)}
.sidebar nav a i{width:20px;text-align:center;font-size:15px}
.main{flex:1;overflow-y:auto;padding:24px 28px}
.card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:20px}
.card2{background:var(--card2);border:1px solid var(--border);border-radius:10px;padding:16px}
.kpi{background:linear-gradient(135deg,var(--card),var(--card2));border:1px solid var(--border);border-radius:12px;padding:20px;position:relative;overflow:hidden}
.kpi::after{content:'';position:absolute;top:-20px;right:-20px;width:80px;height:80px;border-radius:50%;background:var(--accent);opacity:.06}
.btn{padding:8px 16px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;border:none;transition:all .2s;display:inline-flex;align-items:center;gap:6px;font-family:'DM Sans',sans-serif}
.btn-primary{background:var(--accent);color:#000}.btn-primary:hover{background:var(--accent2)}
.btn-secondary{background:var(--card2);color:var(--text);border:1px solid var(--border)}.btn-secondary:hover{background:var(--hover)}
.btn-danger{background:var(--danger);color:#fff}.btn-danger:hover{background:#dc2626}
.btn-success{background:var(--success);color:#fff}.btn-success:hover{background:#059669}
.btn-info{background:var(--info);color:#fff}.btn-info:hover{background:#2563eb}
.btn-sm{padding:5px 10px;font-size:12px}
input,select,textarea{background:var(--bg);border:1px solid var(--border);color:var(--text);padding:9px 12px;border-radius:8px;font-size:13px;font-family:'DM Sans',sans-serif;width:100%;transition:border .2s}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--accent)}
select option{background:var(--card);color:var(--text)}
table{width:100%;border-collapse:collapse;font-size:13px}
thead th{text-align:left;padding:10px 12px;color:var(--muted);font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--card);z-index:1}
tbody td{padding:10px 12px;border-bottom:1px solid var(--border);vertical-align:middle}
tbody tr:hover{background:var(--hover)}
.badge{padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600;display:inline-block}
.badge-success{background:rgba(16,185,129,.15);color:var(--success)}
.badge-warning{background:rgba(245,158,11,.15);color:var(--accent)}
.badge-danger{background:rgba(239,68,68,.15);color:var(--danger)}
.badge-info{background:rgba(59,130,246,.15);color:var(--info)}
.badge-muted{background:rgba(122,129,148,.15);color:var(--muted)}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);backdrop-filter:blur(4px);z-index:100;display:none;align-items:center;justify-content:center}
.modal-overlay.show{display:flex}
.modal{background:var(--card);border:1px solid var(--border);border-radius:16px;width:90%;max-width:680px;max-height:88vh;overflow-y:auto;padding:28px}
.modal-lg{max-width:900px}
.modal h3{margin-bottom:20px;font-size:18px}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.form-group{display:flex;flex-direction:column;gap:4px}
.form-group label{font-size:12px;color:var(--muted);font-weight:500}
.form-group.full{grid-column:1/-1}
.toast-container{position:fixed;top:20px;right:20px;z-index:200;display:flex;flex-direction:column;gap:8px}
.toast{padding:12px 20px;border-radius:10px;font-size:13px;font-weight:500;animation:slideIn .3s ease;min-width:280px;display:flex;align-items:center;gap:8px}
.toast-success{background:#065f46;color:#6ee7b7;border:1px solid #10b981}
.toast-error{background:#7f1d1d;color:#fca5a5;border:1px solid #ef4444}
.toast-info{background:#1e3a5f;color:#93c5fd;border:1px solid #3b82f6}
@keyframes slideIn{from{transform:translateX(100%);opacity:0}to{transform:translateX(0);opacity:1}}
@keyframes fadeUp{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}
.fade-up{animation:fadeUp .4s ease both}
.section{display:none}.section.active{display:block}
.bar-chart{display:flex;align-items:flex-end;gap:6px;height:160px;padding-top:10px}
.bar-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px}
.bar{width:100%;border-radius:4px 4px 0 0;transition:height .5s ease;min-height:2px}
.bar-label{font-size:10px;color:var(--muted);white-space:nowrap}
.bar-val{font-size:10px;color:var(--text);font-weight:600}
.empty-state{text-align:center;padding:60px 20px;color:var(--muted)}
.empty-state i{font-size:48px;margin-bottom:16px;opacity:.3}
.prestation-row,.piece-row{display:grid;grid-template-columns:2fr 1fr 1fr 80px 40px;gap:8px;align-items:end;margin-bottom:8px}
@media(max-width:768px){.sidebar{width:60px;min-width:60px}.sidebar .logo span,.sidebar nav a span{display:none}.sidebar nav a{justify-content:center;padding:14px}.form-grid{grid-template-columns:1fr}.main{padding:16px}}
.search-box{position:relative}.search-box i{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:13px}.search-box input{padding-left:36px}
.stock-alert{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);border-radius:8px;padding:10px 14px;font-size:12px;color:#fca5a5;display:flex;align-items:center;gap:8px}
.dist-result{background:rgba(59,130,246,.08);border:1px solid rgba(59,130,246,.25);border-radius:8px;padding:10px 14px;font-size:12px;color:#93c5fd;display:flex;align-items:center;gap:8px;margin-top:8px}
.dist-result.error{background:rgba(239,68,68,.08);border-color:rgba(239,68,68,.25);color:#fca5a5}
.dist-result.success{background:rgba(16,185,129,.08);border-color:rgba(16,185,129,.25);color:#6ee7b7}
.spinner{display:inline-block;width:14px;height:14px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .6s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.addr-hint{font-size:11px;color:var(--muted);margin-top:2px}
</style>
</head>

function getGeoCache(){
  try{ return JSON.parse(localStorage.getItem(GEO_CACHE_KEY)) || {}; }catch(e){ return {}; }
}
function setGeoCache(cache){
  try{ localStorage.setItem(GEO_CACHE_KEY, JSON.stringify(cache)); }catch(e){}
}

// Formule de Haversine : distance à vol d'oiseau en km entre 2 points GPS
function haversine(lat1, lon1, lat2, lon2){
  const R = 6371; // rayon Terre en km
  const dLat = (lat2-lat1)*Math.PI/180;
  const dLon = (lon2-lon1)*Math.PI/180;
  const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

// Normaliser une adresse pour le cache (minuscule, sans espaces multiples)
function normalizeAddr(a){return (a||'').toLowerCase().replace(/\s+/g,' ').trim();}

// Géocoder une adresse via Nominatim (OpenStreetMap) — gratuit, sans clé
async function geocodeAddress(adresse){
  const cache = getGeoCache();
  const key = normalizeAddr(adresse);

  // Vérifier le cache d'abord
  if(cache[key] && cache[key].lat){
    return {lat:cache[key].lat, lng:cache[key].lng, km:cache[key].km, cached:true};
  }

  // Appel Nominatim
  const url = NOMINATIM_URL + '?format=json&limit=1&countrycodes=fr&q=' + encodeURIComponent(adresse + ', Pas-de-Calais, France');
  const resp = await fetch(url, {headers:{'User-Agent':'AtelierSebMobile/1.0'}});
  if(!resp.ok) throw new Error('Erreur réseau Nominatim ('+resp.status+')');
  const data = await resp.json();
  if(!data || data.length===0) throw new Error('Adresse introuvable');

  const lat = parseFloat(data[0].lat);
  const lng = parseFloat(data[0].lon);
  const distVolOiseau = haversine(LIEVIN_LAT, LIEVIN_LNG, lat, lng);
  const km = Math.round(distVolOiseau * ROAD_MULTIPLIER * 10) / 10;

  // Mettre en cache
  cache[key] = {lat, lng, km, date: Date.now()};
  setGeoCache(cache);

  return {lat, lng, km, cached:false};
}

// Afficher le résultat de distance dans un conteneur
function showDistResult(containerId, result, error){
  const el = document.getElementById(containerId);
  if(!el) return;
  if(error){
    el.className='dist-result error';
    el.innerHTML=`<i class="fa-solid fa-circle-xmark"></i><span>${error}</span>`;
  } else {
    el.className='dist-result success';
    el.innerHTML=`<i class="fa-solid fa-route"></i><span><strong>${result.km} km</strong> estimés depuis Liévin — ${result.cached?'(cache)':'(calculé)'} — Zone : <strong>${getZone(result.km).nom}</strong></span>`;
  }
}

  const el = document.getElementById('devDistResult');

}

function autofillDevisClient(){
  const cid=$('#fDevCli').value.trim();const c=getClientById(cid);
  if(c){$('#fDevNom').value=c.nom;$('#fDevTel').value=c.tel;
    // Pré-remplir l'adresse complète pour le calcul de distance
    const addrFull = c.adresse || '';
    $('#fDevAddrFull').value = addrFull;
  } else {$('#fDevNom').value='';$('#fDevTel').value='';$('#fDevAddrFull').value='';}
  calcDevisTotal();
}

function calcDevisTotal(){
  const code=$('#fDevService').value;const km=parseFloat($('#fDevKm').value)||0;
  const t=getTarifByCode(code);let prixMO=t?t.prix:0;
  const zone=getZone(km);$('#fDevZone').value=zone.nom+' — '+zone.desc;
  const frais=getFraisDeplacement(km,prixMO);
  const total=Math.max(prixMO+frais,D.parametres.minFacturation||0);
  $('#fDevTotal').value=fmt(total);
}

function autofillIntClient(){
  const cid=$('#fIntCli').value;const c=getClientById(cid);
  if(c){$('#fIntTel').value=c.tel;$('#fIntAddrFull').value=c.adresse||'';$('#fIntVelo').value=c.typeVelo||'';}
  else{$('#fIntTel').value='';$('#fIntAddrFull').value='';$('#fIntVelo').value='';}
  calcIntTotal();
}

function renderIntPrestations(){
  return tempPrestations.map((p,i)=>`<div class="prestation-row">
    <select onchange="tempPrestations[${i}].code=this.value;calcIntTotal()" style="font-size:12px">
      <option value="">— Code —</option>${D.grilleTarifaire.filter(t=>t.code!=='REM').map(t=>`<option value="${t.code}" ${p.code===t.code?'selected':''}>${t.code} — ${t.nom}</option>`).join('')}
    </select>
    <input value="${p.detail||''}" placeholder="Détail" onchange="tempPrestations[${i}].detail=this.value" style="font-size:12px">
    <input type="number" value="${p.qte||1}" min="1" onchange="tempPrestations[${i}].qte=parseInt(this.value)||1;calcIntTotal()" style="font-size:12px">
    <input value="${fmt(p.prixUnit||0)}" readonly style="font-size:12px;opacity:.7">
    <button class="btn btn-danger btn-sm" onclick="tempPrestations.splice(${i},1);document.getElementById('intPrestations').innerHTML=renderIntPrestations();calcIntTotal()" style="padding:4px 8px"><i class="fa-solid fa-times"></i></button>
  </div>`).join('');
}
function renderIntPieces(){
  return tempPieces.map((p,i)=>`<div class="piece-row">
    <select onchange="tempPieces[${i}].ref=this.value;autofillIntPiece(${i})" style="font-size:12px">
      <option value="">— Réf —</option>${D.cataloguePieces.map(pc=>`<option value="${pc.ref}" ${p.ref===pc.ref?'selected':''}>${pc.ref} — ${pc.nom}</option>`).join('')}
    </select>
    <input value="${p.marque||''}" readonly placeholder="Marque" style="font-size:12px;opacity:.7">
    <input type="number" value="${p.qte||1}" min="1" onchange="tempPieces[${i}].qte=parseInt(this.value)||1;calcIntTotal()" style="font-size:12px">
    <input value="${fmt(p.prixUnit||0)}" readonly style="font-size:12px;opacity:.7">
    <button class="btn btn-danger btn-sm" onclick="tempPieces.splice(${i},1);document.getElementById('intPieces').innerHTML=renderIntPieces();calcIntTotal()" style="padding:4px 8px"><i class="fa-solid fa-times"></i></button>
  </div>`).join('');
}
function autofillIntPiece(i){
  const pc=getPieceByRef(tempPieces[i].ref);
  if(pc){tempPieces[i].marque=pc.marque;tempPieces[i].nom=pc.nom;tempPieces[i].prixUnit=pc.prixVente;}
  else{tempPieces[i].marque='';tempPieces[i].prixUnit=0;}
  document.getElementById('intPieces').innerHTML=renderIntPieces();calcIntTotal();
}
function addIntPrestation(){tempPrestations.push({code:'',detail:'',qte:1,prixUnit:0});document.getElementById('intPrestations').innerHTML=renderIntPrestations();}
function addIntPiece(){tempPieces.push({ref:'',nom:'',marque:'',qte:1,prixUnit:0});document.getElementById('intPieces').innerHTML=renderIntPieces();}

function calcIntTotal(){
  let mo=0,pieces=0;
  tempPrestations.forEach(p=>{const t=getTarifByCode(p.code);p.prixUnit=t?t.prix:0;mo+=p.prixUnit*(p.qte||1);});
  tempPieces.forEach(p=>{pieces+=p.prixUnit*(p.qte||1);});
  const km=parseFloat($('#fIntKm')?.value)||0;
  const frais=getFraisDeplacement(km,mo+pieces);
  const total=Math.max(mo+pieces+frais,D.parametres.minFacturation||0);
  if($('#intSubMO'))$('#intSubMO').textContent=fmt(mo);
  if($('#intSubPieces'))$('#intSubPieces').textContent=fmt(pieces);
  if($('#intSubDepl'))$('#intSubDepl').textContent=fmt(frais);
  if($('#intTotalTTC'))$('#intTotalTTC').textContent=fmt(total);
  tempPrestations.forEach((p,i)=>{const rows=document.querySelectorAll('.prestation-row');if(rows[i])rows[i].querySelectorAll('input')[1].value=fmt(p.prixUnit);});
  tempPieces.forEach((p,i)=>{const rows=document.querySelectorAll('.piece-row');if(rows[i])rows[i].querySelectorAll('input')[2].value=fmt(p.prixUnit);});
}

function saveIntervention(id){
  const num=$('#fIntNum').value.trim();if(!num){toast('N° obligatoire','error');return;}
  const dv=$('#fIntDate').value;const date=dv?dv.split('-').reverse().join('/'):today();
  const km=parseFloat($('#fIntKm').value)||0;
  let mo=0,pieces=0;
  tempPrestations.forEach(p=>{const t=getTarifByCode(p.code);p.prixUnit=t?t.prix:0;mo+=p.prixUnit*(p.qte||1);});
  tempPieces.forEach(p=>{pieces+=p.prixUnit*(p.qte||1);});
  const frais=getFraisDeplacement(km,mo+pieces);const total=Math.max(mo+pieces+frais,D.parametres.minFacturation||0);
  const zone=getZone(km);const sel=$('#fIntCli').selectedOptions[0];
  const obj={numero:num,date,clientId:$('#fIntCli').value,client:sel?sel.text.split('—')[1]?.trim():'',telephone:$('#fIntTel').value,adresse:$('#fIntAddrFull').value,adresseFull:$('#fIntAddrFull').value,zone:zone.nom,typeVelo:$('#fIntVelo').value,marque:$('#fIntMarque').value,km,prestations:[...tempPrestations],pieces:[...tempPieces],totalMO:mo,totalPieces:pieces,deplacement:frais,totalTTC:total,paiement:$('#fIntPaie').value,note:$('#fIntNote').value.trim()};
  if(!id){tempPieces.forEach(p=>{const pc=getPieceByRef(p.ref);if(pc)pc.stock=Math.max(0,pc.stock-(p.qte||1));});}
  const cli=getClientById(obj.clientId);
  if(cli&&!id){cli.nbInter=(cli.nbInter||0)+1;cli.caTotal=(cli.caTotal||0)+total;}
  const moisNom=date.split('/').length===3?['Janvier','Février','Mars','Avril','Mai','Juin','Juillet','Août','Septembre','Octobre','Novembre','Décembre'][parseInt(date.split('/')[1])-1]:'';
  if(moisNom&&!id){const m=D.tresorerie.find(t=>t.mois===moisNom);if(m){m.caMO+=mo;m.caPieces+=pieces;m.depl+=frais;}}
  if(id){const old=D.interventions.find(x=>x.id===id);if(old)Object.assign(old,obj);toast('Intervention modifiée');}
  else{obj.id=num;D.interventions.push(obj);toast('Intervention enregistrée');}
  saveData();closeModal();renderPage();
}

  const w=window.open('','_blank');
  w.document.write(`<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Bon ${i.numero}</title>
  <style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:Arial,sans-serif;padding:30px;color:#222;max-width:750px;margin:auto;font-size:13px}
  h1{font-size:18px;margin-bottom:2px}.sub{font-size:11px;color:#666;margin-bottom:20px}
  table{width:100%;border-collapse:collapse;margin:10px 0}th,td{border:1px solid #ccc;padding:6px 10px;text-align:left;font-size:12px}th{background:#f8f8f8;font-size:11px;text-transform:uppercase}
  .total-row td{font-weight:700;font-size:15px;background:#f0f0f0}.grand-total{font-size:20px;text-align:right;margin:12px 0;color:#d97706}
  .sig{display:flex;justify-content:space-between;margin-top:60px}.sig-line{border-top:1px solid #333;margin-top:50px;width:200px;text-align:center;font-size:11px;padding-top:4px}
  .header{display:flex;justify-content:space-between;border-bottom:2px solid #d97706;padding-bottom:12px;margin-bottom:16px}.footer{margin-top:30px;font-size:10px;color:#999;border-top:1px solid #ddd;padding-top:8px}</style></head><body>
  <div class="header"><div><h1>${p.nom}</h1><div class="sub">${p.proprietaire} — ${p.statut}<br>${p.adresse} — ${p.zone}<br>Tél : ${p.telephone}</div></div>
  <div style="text-align:right"><h1 style="color:#d97706">BON D'INTERVENTION</h1><div class="sub">${i.numero} — ${i.date}</div></div></div>
  <table><tr><th>Client</th><td>${i.client}</td><th>Téléphone</th><td>${i.telephone||'—'}</td></tr>
  <tr><th>Adresse</th><td>${i.adresseFull||i.adresse||'—'}</td><th>Zone</th><td>${i.zone} (${i.km} km)</td></tr>
  <tr><th>Type vélo</th><td>${i.typeVelo||'—'}</td><th>Marque</th><td>${i.marque||'—'}</td></tr></table>
  <h3 style="margin:16px 0 8px;font-size:13px;color:#d97706">PRESTATIONS (Main d'œuvre)</h3>
  <table><thead><tr><th>#</th><th>Code</th><th>Prestation</th><th>Détail</th><th style="text-align:center">Qté</th><th style="text-align:right">Prix unit.</th><th style="text-align:right">Total</th></tr></thead><tbody>${pRows}
  ${pRows?`<tr class="total-row"><td colspan="6" style="text-align:right">Sous-total MO</td><td style="text-align:right">${fmt(i.totalMO)}</td></tr>`:''}</tbody></table>
  <h3 style="margin:16px 0 8px;font-size:13px;color:#10b981">PIÈCES DÉTACHÉES</h3>

function saveSAV(id){
  const nom=$('#fSavNom').value.trim();if(!nom){toast('Nom obligatoire','error');return;}
  const dv=$('#fSavDate').value;const date=dv?dv.split('-').reverse().join('/'):today();
  const obj={id:id||$('#fSavId').value.trim(),dateOuverture:date,nomClient:nom,nouveauClient:false,telephone:$('#fSavTel').value.trim(),email:$('#fSavEmail').value.trim(),numFacture:$('#fSavFact').value.trim(),motifRetour:$('#fSavMotif').value.trim(),priseGarantie:$('#fSavGar').value,statut:$('#fSavStatut').value,diagnostic:$('#fSavDiag').value.trim(),notes:$('#fSavNotes').value.trim()};

function openPieceForm(ref){

      <div class="form-group full"><label>Désignation</label><input id="fPcNom" value="${p.nom}"></div>
      <div class="form-group"><label>Marque</label><input id="fPcMarque" value="${p.marque}"></div>

function savePiece(ref){
  const nom=$('#fPcNom').value.trim();if(!nom){toast('Désignation obligatoire','error');return;}
  const obj={ref:ref||$('#fPcRef').value.trim(),nom,marque:$('#fPcMarque').value.trim(),type:$('#fPcType').value.trim(),cat:$('#fPcCat').value,stock:parseInt($('#fPcStock').value)||0,stockMini:parseInt($('#fPcMini').value)||1,prixAchat:parseFloat($('#fPcAchat').value)||0,prixVente:parseFloat($('#fPcVente').value)||0,fournisseur:$('#fPcFour').value.trim()};
  if(ref){const p=getPieceByRef(ref);if(p)Object.assign(p,obj);toast('Modifié');}
  else{if(D.cataloguePieces.find(p=>p.ref===obj.ref)){toast('Réf existe','error');return;}D.cataloguePieces.push(obj);toast('Ajouté');}
  saveData();closeModal();renderPage();
}

function renderTresorerie(){
  const totCA=D.tresorerie.reduce((s,t)=>s+t.caMO+t.caPieces+t.depl,0);
  const totCh=D.tresorerie.reduce((s,t)=>s+t.chargesCarburant+t.chargesPieces+t.chargesTel+t.chargesAssurance,0);
  const totBen=totCA-totCh;const totARE=D.tresorerie.reduce((s,t)=>s+(t.are||0),0);
  return `<div class="fade-up">
    <h1 style="font-size:24px;font-weight:700;margin-bottom:4px">Trésorerie 2026</h1>

      <div class="kpi"><div style="font-size:12px;color:var(--muted);margin-bottom:6px">Charges annuel</div><div style="font-size:22px;font-weight:700;color:var(--danger);font-family:'Space Grotesk'">${fmt(totCh)}</div></div>
      <div class="kpi"><div style="font-size:12px;color:var(--muted);margin-bottom:6px">Bénéfice net</div><div style="font-size:22px;font-weight:700;color:${totBen>=0?'var(--success)':'var(--danger)'};font-family:'Space Grotesk'">${fmt(totBen)}</div></div>
    </div>
    <div class="card" style="padding:0;overflow:hidden"><div style="overflow-x:auto">
      <table><thead><tr><th>Mois</th><th>CA MO</th><th>CA Pièces</th><th>Dépl.</th><th style="background:rgba(16,185,129,.1);color:var(--success)">Recettes</th><th>Carb.</th><th>Pièces ach.</th><th>Tél</th><th>Ass.</th><th style="background:rgba(239,68,68,.1);color:var(--danger)">Charges</th><th>Bénéfice</th><th>ARE</th><th>Revenu</th><th>Obj.</th></tr></thead><tbody>
      ${D.tresorerie.map(t=>{const r=t.caMO+t.caPieces+t.depl;const c=t.chargesCarburant+t.chargesPieces+t.chargesTel+t.chargesAssurance;const b=r-c;const rv=b+(t.are||0);
      return `<tr><td style="font-weight:600">${t.mois}</td><td>${fmt(t.caMO)}</td><td>${fmt(t.caPieces)}</td><td>${fmt(t.depl)}</td>

        <td style="font-weight:600;color:var(--danger)">${fmt(c)}</td><td style="font-weight:700;color:${b>=0?'var(--success)':'var(--danger)'}">${fmt(b)}</td>
        <td>${fmt(t.are||0)}</td><td style="font-weight:600">${fmt(rv)}</td>
        <td>${r>=D.parametres.seuilRentabilite?'<span class="badge badge-success">OK</span>':'<span class="badge badge-danger">Non</span>'}</td></tr>`;}).join('')}
      <tr style="background:var(--bg2);font-weight:700"><td>TOTAL</td>
        <td>${fmt(D.tresorerie.reduce((s,t)=>s+t.caMO,0))}</td><td>${fmt(D.tresorerie.reduce((s,t)=>s+t.caPieces,0))}</td><td>${fmt(D.tresorerie.reduce((s,t)=>s+t.depl,0))}</td>
        <td style="color:var(--success)">${fmt(totCA)}</td><td>${fmt(D.tresorerie.reduce((s,t)=>s+t.chargesCarburant,0))}</td><td>${fmt(D.tresorerie.reduce((s,t)=>s+t.chargesPieces,0))}</td>
        <td>${fmt(D.tresorerie.reduce((s,t)=>s+t.chargesTel,0))}</td><td>${fmt(D.tresorerie.reduce((s,t)=>s+t.chargesAssurance,0))}</td>
        <td style="color:var(--danger)">${fmt(totCh)}</td><td style="color:${totBen>=0?'var(--success)':'var(--danger)'}">${fmt(totBen)}</td>
        <td>${fmt(totARE)}</td><td>${fmt(totBen+totARE)}</td><td>${totCA>=D.parametres.seuilRentabilite*12?'<span class="badge badge-success">OK</span>':'<span class="badge badge-danger">Non</span>'}</td></tr>
      </tbody></table></div></div>
    <div class="card" style="margin-top:16px">
      <h3 style="font-size:14px;margin-bottom:12px"><i class="fa-solid fa-pen" style="color:var(--accent);margin-right:8px"></i>Modifier les charges</h3>
      <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px">
        <div class="form-group"><label>Mois</label><select id="fTrMois">${D.tresorerie.map((t,i)=>`<option value="${i}">${t.mois}</option>`).join('')}</select></div>
        <div class="form-group"><label>Carburant</label><input id="fTrCarb" type="number" min="0" step="10" value="0"></div>
        <div class="form-group"><label>Pièces achetées</label><input id="fTrPieces" type="number" min="0" step="10" value="0"></div>
        <div class="form-group"><label>Tél/Internet</label><input id="fTrTel" type="number" min="0" step="5" value="30"></div>
        <div class="form-group"><label>Assurance</label><input id="fTrAss" type="number" min="0" step="5" value="30"></div>
        <div class="form-group"><label>ARE</label><input id="fTrARE" type="number" min="0" step="50" value="0"></div>
      </div>
      <button class="btn btn-primary" style="margin-top:12px" onclick="saveTresorerieCharges()"><i class="fa-solid fa-save"></i> Enregistrer</button>
    </div></div>`;
}
function saveTresorerieCharges(){
  const i=parseInt($('#fTrMois').value);const t=D.tresorerie[i];if(!t)return;
  t.chargesCarburant=parseFloat($('#fTrCarb').value)||0;t.chargesPieces=parseFloat($('#fTrPieces').value)||0;
  t.chargesTel=parseFloat($('#fTrTel').value)||0;t.chargesAssurance=parseFloat($('#fTrAss').value)||0;
  t.are=parseFloat($('#fTrARE').value)||0;saveData();renderPage();toast('Charges mises à jour');
}

function saveParametres(){
  const p=D.parametres;
  p.nom=$('#pNom').value;p.proprietaire=$('#pProp').value;p.statut=$('#pStatut').value;p.adresse=$('#pAddr').value;
  p.zone=$('#pZone').value;p.siret=$('#pSiret').value;p.telephone=$('#pTel').value;p.email=$('#pEmail').value;
  p.zone1Km=parseInt($('#pZ1km').value)||5;p.zone1Frais=parseFloat($('#pZ1f').value)||5;
  p.zone2Frais=parseFloat($('#pZ2f').value)||15;p.zone3Frais=parseFloat($('#pZ3f').value)||25;
  p.zone4Frais=parseFloat($('#pZ4f').value)||50;p.minFacturation=parseFloat($('#pMin').value)||45;
  p.seuilRentabilite=parseFloat($('#pSeuil').value)||700;p.objectifCA1=parseFloat($('#pCA1').value)||2500;p.objectifCA2=parseFloat($('#pCA2').value)||4000;
  p.garantieMO=parseInt($('#pGarMO').value)||3;p.garantiePieces=parseInt($('#pGarP').value)||2;
  p.validiteDevis=parseInt($('#pValDev').value)||30;p.annulationFrais=parseFloat($('#pAnnul').value)||15;
  D.zones[0].max=p.zone1Km;D.zones[0].fraisLt45=p.zone1Frais;
  D.zones[1].fraisGe45=p.zone2Frais;D.zones[1].fraisLt45=p.zone2Frais;
  D.zones[2].fraisGe45=p.zone3Frais;D.zones[2].fraisLt45=p.zone3Frais;
  D.zones[3].fraisGe45=p.zone4Frais;D.zones[3].fraisLt45=p.zone4Frais;
  saveData();toast('Paramètres enregistrés');
}
function resetData(){
  openModal(`<h3>Réinitialiser ?</h3><p style="color:var(--danger);margin-bottom:16px">Toutes les données seront perdues. <strong>Irréversible.</strong></p>
  <div style="display:flex;gap:8px;justify-content:flex-end"><button class="btn btn-secondary" onclick="closeModal()">Annuler</button>
  <button class="btn btn-danger" onclick="localStorage.removeItem(STORE_KEY);localStorage.removeItem(GEO_CACHE_KEY);D=JSON.parse(JSON.stringify(DEFAULT_DATA));saveData();closeModal();renderPage();toast('Réinitialisé')">Confirmer</button></div>`);
}
function exportData(){
  const blob=new Blob([JSON.stringify(D,null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);
  a.download='atelier-seb-backup-'+new Date().toISOString().split('T')[0]+'.json';a.click();toast('Exporté');
}
function importData(e){
  const file=e.target.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=function(ev){try{const data=JSON.parse(ev.target.result);for(const k in DEFAULT_DATA){if(!(k in data))data[k]=JSON.parse(JSON.stringify(DEFAULT_DATA[k]));}D=data;saveData();renderPage();toast('Importé');}catch(err){toast('Fichier invalide','error');}};
  reader.readAsText(file);e.target.value='';
}
// ═══ ENVOI VERS DISCORD ═══
const DISCORD_WEBHOOK = 'COLLE TON URL WEBHOOK ICI';

async function sendToDiscord(titre, champs) {
  if (!DISCORD_WEBHOOK || DISCORD_WEBHOOK === 'COLLE TON URL WEBHOOK ICI') return;
  let description = '';
  for (const [label, valeur] of Object.entries(champs)) {
    if (valeur) description += '**' + label + ' :** ' + valeur + '\n';
  }
  try {
    await fetch(DISCORD_WEBHOOK, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        username: 'Atelier Séb Mobile',
        embeds: [{
          title: titre,
          description: description,
          color: 2451587,
          footer: { text: 'Nouveau contact — ' + new Date().toLocaleString('fr-FR') }
        }]
      })
    });
  } catch(e) { /* silencieux */ }
}
